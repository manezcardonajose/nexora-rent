{% extends "base.html" %}
{% block title %}Editar inquilino{% endblock %}

{% block content %}
<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="mb-1"><i class="bi bi-pencil-square"></i> Editar inquilino</h2>
            <p class="text-muted mb-0">Actualización de datos personales y contractuales</p>
        </div>
        <a href="{{ url_for('alquileres.ver_inquilino', id=inquilino.id) }}" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left"></i> Volver a ficha
        </a>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-header bg-warning">
            <strong>Modificar datos</strong>
        </div>
        <div class="card-body">

            <form method="POST">
                <div class="row g-3">

                    <div class="col-md-4">
                        <label class="form-label">Nombre</label>
                        <input type="text" name="nombre" class="form-control" value="{{ inquilino.nombre }}" required>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Apellidos</label>
                        <input type="text" name="apellidos" class="form-control" value="{{ inquilino.apellidos or '' }}">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">DNI/NIE</label>
                        <input type="text" name="dni" class="form-control" value="{{ inquilino.dni or '' }}">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Nacionalidad</label>
                        <input type="text" name="nacionalidad" class="form-control" value="{{ inquilino.nacionalidad or '' }}">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Teléfono</label>
                        <input type="text" name="telefono" class="form-control" value="{{ inquilino.telefono or '' }}">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control" value="{{ inquilino.email or '' }}">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Dirección</label>
                        <input type="text" name="direccion" class="form-control" value="{{ inquilino.direccion or '' }}">
                    </div>

                    <div class="col-md-2">
                        <label class="form-label">Código postal</label>
                        <input type="text" name="codigo_postal" class="form-control" value="{{ inquilino.codigo_postal or '' }}">
                    </div>

                    <div class="col-md-2">
                        <label class="form-label">Municipio</label>
                        <input type="text" name="municipio" class="form-control" value="{{ inquilino.municipio or '' }}">
                    </div>

                    <div class="col-md-2">
                        <label class="form-label">Provincia</label>
                        <input type="text" name="provincia" class="form-control" value="{{ inquilino.provincia or '' }}">
                    </div>

                    <div class="col-md-3">
                        <label class="form-label">Fecha nacimiento</label>
                        <input type="date"
                               name="fecha_nacimiento"
                               class="form-control"
                               value="{{ inquilino.fecha_nacimiento.strftime('%Y-%m-%d') if inquilino.fecha_nacimiento else '' }}">
                    </div>

                    <div class="col-md-3">
                        <label class="form-label">Estado civil</label>
                        <input type="text" name="estado_civil" class="form-control" value="{{ inquilino.estado_civil or '' }}">
                    </div>

                </div>

                <div class="d-flex justify-content-end gap-2 mt-4">
                    <a href="{{ url_for('alquileres.ver_inquilino', id=inquilino.id) }}" class="btn btn-secondary">Cancelar</a>
                    <button type="submit" class="btn btn-success">
                        <i class="bi bi-check-circle"></i> Guardar cambios
                    </button>
                </div>
            </form>

        </div>
    </div>

</div>
{% endblock %}
