{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-info text-white">
                <h4 class="mb-0"><i class="bi bi-envelope"></i> Enviar PDF por email</h4>
            </div>
            <div class="card-body">
                <p class="text-muted">Reserva #{{ reserva.id }} - {{ reserva.propiedad.nombre }}</p>

                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Email destinatario</label>
                        <input type="email" name="email" class="form-control"
                               value="{{ reserva.huespedes.first().email if reserva.huespedes.first() else '' }}" required>
                        <small class="text-muted">Se enviará el PDF de la reserva a esta dirección</small>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-info text-white">
                            <i class="bi bi-send"></i> Enviar
                        </button>
                        <a href="{{ url_for('reservas.ver', id=reserva.id) }}" class="btn btn-secondary">
                            <i class="bi bi-x-circle"></i> Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
