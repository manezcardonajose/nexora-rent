{% extends "base.html" %}

{% block title %}Nueva lectura{% endblock %}

{% block content %}
<div class="container-fluid px-3 px-lg-4">
    <div class="card shadow-sm">
        <div class="card-header bg-primary text-white">
            <h5 class="mb-0"><i class="bi bi-plus-circle"></i> Nueva lectura</h5>
        </div>
        <div class="card-body">
            <form method="POST">
                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Contador</label>
                        <select name="contador_id" class="form-select" required>
                            {% for contador in contadores %}
                            <option value="{{ contador.id }}">{{ contador.nombre }} ({{ contador.tipo }})</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="form-label">Contrato</label>
                        <select name="contrato_id" class="form-select">
                            <option value="">Sin contrato</option>
                            {% for contrato in contratos %}
                            <option value="{{ contrato.id }}">#{{ contrato.id }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="form-label">Fecha lectura</label>
                        <input type="date" name="fecha_lectura" class="form-control" required>
                    </div>

                    <div class="col-md-3 mb-3">
                        <label class="form-label">Lectura anterior</label>
                        <input type="number" step="0.01" name="lectura_anterior" class="form-control" value="0" required>
                    </div>

                    <div class="col-md-3 mb-3">
                        <label class="form-label">Lectura actual</label>
                        <input type="number" step="0.01" name="lectura_actual" class="form-control" value="0" required>
                    </div>

                    <div class="col-md-3 mb-3">
                        <label class="form-label">Precio unitario</label>
                        <input type="number" step="0.001" name="precio_unitario" class="form-control" value="0" required>
                    </div>

                    <div class="col-md-3 mb-3">
                        <label class="form-label">Generar recibo</label>
                        <select name="generar_recibo" class="form-select">
                            <option value="0">No</option>
                            <option value="1">Sí</option>
                        </select>
                    </div>

                    <div class="col-md-12 mb-3">
                        <label class="form-label">Observaciones</label>
                        <textarea name="observaciones" class="form-control" rows="3"></textarea>
                    </div>
                </div>

                <div class="d-flex justify-content-between mt-3">
                    <a href="{{ url_for('alquileres.lecturas') }}" class="btn btn-secondary">Volver</a>
                    <button type="submit" class="btn btn-success">Guardar</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
