{% extends "base.html" %}

{% block title %}Nuevo contador{% endblock %}

{% block content %}
<div class="container-fluid px-3 px-lg-4">
    <div class="card shadow-sm">
        <div class="card-header bg-primary text-white">
            <h5 class="mb-0"><i class="bi bi-plus-circle"></i> Nuevo contador</h5>
        </div>
        <div class="card-body">
            <form method="POST">
                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Propiedad</label>
                        <select name="propiedad_id" class="form-select" required>
                            {% for propiedad in propiedades %}
                            <option value="{{ propiedad.id }}">{{ propiedad.nombre }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="form-label">Tipo</label>
                        <select name="tipo" class="form-select" required>
                            <option value="agua">Agua</option>
                            <option value="luz">Luz</option>
                            <option value="gas">Gas</option>
                            <option value="otro">Otro</option>
                        </select>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="form-label">Activo</label>
                        <select name="activo" class="form-select">
                            <option value="1">Sí</option>
                            <option value="0">No</option>
                        </select>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Nombre</label>
                        <input type="text" name="nombre" class="form-control" required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Número de serie</label>
                        <input type="text" name="numero_serie" class="form-control">
                    </div>
                </div>

                <div class="d-flex justify-content-between mt-3">
                    <a href="{{ url_for('alquileres.contadores') }}" class="btn btn-secondary">Volver</a>
                    <button type="submit" class="btn btn-success">Guardar</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
