{% extends "base.html" %}
{% block title %}Nuevo contrato{% endblock %}

{% block content %}

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="mb-1"><i class="bi bi-file-earmark-plus"></i> Nuevo contrato</h2>
            <p class="text-muted mb-0">Crear un nuevo contrato de alquiler</p>
        </div>
        <a href="{{ url_for('alquileres.contratos') }}" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left"></i> Volver
        </a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">

            <form method="POST">

                <!-- INQUILINO -->
                <div class="mb-3">
                    <label class="form-label">Inquilino</label>
                    <select name="inquilino_id" class="form-select" required>
                        <option value="">-- Seleccionar inquilino --</option>
                        {% for i in inquilinos %}
                        <option value="{{ i.id }}">
                            {{ i.nombre }} {{ i.apellidos }}
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <!-- PROPIEDAD -->
                <div class="mb-3">
                    <label class="form-label">Propiedad</label>
                    <select name="propiedad_id" class="form-select" required>
                        <option value="">-- Seleccionar propiedad --</option>
                        {% for p in propiedades %}
                        <option value="{{ p.id }}">
                            {{ p.nombre }}
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <!-- FECHAS -->
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Fecha inicio</label>
                        <input type="date" name="fecha_inicio" class="form-control" required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Fecha fin</label>
                        <input type="date" name="fecha_fin" class="form-control">
                    </div>
                </div>

                <!-- ECONOMÍA -->
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Renta mensual (€)</label>
                        <input type="number" step="0.01" name="renta_mensual" class="form-control">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Fianza (€)</label>
                        <input type="number" step="0.01" name="fianza" class="form-control">
                    </div>
                </div>

                <!-- ESTADO -->
                <div class="mb-3">
                    <label class="form-label">Estado</label>
                    <select name="estado" class="form-select">
                        <option value="activo">Activo</option>
                        <option value="finalizado">Finalizado</option>
                        <option value="cancelado">Cancelado</option>
                    </select>
                </div>

                <!-- OBSERVACIONES -->
                <div class="mb-3">
                    <label class="form-label">Observaciones</label>
                    <textarea name="observaciones" class="form-control" rows="3"></textarea>
                </div>

                <!-- BOTONES -->
                <div class="d-flex justify-content-end gap-2">
                    <a href="{{ url_for('alquileres.contratos') }}" class="btn btn-secondary">
                        Cancelar
                    </a>
                    <button type="submit" class="btn btn-success">
                        <i class="bi bi-check-circle"></i> Guardar contrato
                    </button>
                </div>

            </form>

        </div>
    </div>

</div>

{% endblock %}
